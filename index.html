<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:sans-serif;
overflow:hidden;
color:white;
text-align:center;
}

/* video background */

#bgvideo{
position:fixed;
right:0;
bottom:0;
min-width:100%;
min-height:100%;
object-fit:cover;
z-index:-2;
}

/* efek gelap */

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
z-index:-1;
}

/* tombol */

#open{
font-size:22px;
cursor:pointer;
padding:15px 25px;
border:2px solid white;
border-radius:30px;
background:rgba(0,0,0,0.5);
}

/* pesan */

#message{
position:absolute;
top:15%;
font-size:28px;
opacity:0;
transition:1s;
}

/* bintang */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:blink 2s infinite;
}

@keyframes blink{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

/* love */

.heart{
position:absolute;
color:pink;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-800px);
opacity:0;
}
}

</style>
</head>

<body>

<video autoplay muted loop id="bgvideo">
<source src="bunga.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div id="open" onclick="start()">Klik disini 💖</div>

<div id="message"></div>

<audio id="music" autoplay loop>
<source src="music.mp3" type="audio/mp3">
</audio>

<script>

/* bintang */

for(let i=0;i<80;i++){
let star=document.createElement("div")
star.className="star"
star.style.left=Math.random()*100+"%"
star.style.top=Math.random()*100+"%"
document.body.appendChild(star)
}

/* love */

setInterval(()=>{
let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="💖"
heart.style.left=Math.random()*100+"%"
heart.style.bottom="0px"
document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},6000)

},800)

/* pesan */

let texts=[
"Halo Zee",
"Aku minta maaf ya",
"Aku benar benar menyesal",
"Terima kasih sudah jujur",
"Aku sayang kamu 💖"
]

let i=0

function start(){

document.getElementById("open").style.display="none"

document.getElementById("music").play()

let msg=document.getElementById("message")
msg.style.opacity=1

showText()

}

function showText(){

if(i<texts.length){

document.getElementById("message").innerHTML=texts[i]

i++

setTimeout(showText,3000)

}

}

</script>

</body>
</html>
